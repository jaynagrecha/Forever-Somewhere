# fly.toml — deploy with: fly launch && fly deploy
app = "forever-somewhere-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////data/forever_somewhere.db"
  UPLOAD_DIR = "/data/uploads"

[mounts]
  source = "forever_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
