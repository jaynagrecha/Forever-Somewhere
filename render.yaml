# Render blueprint — backend API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: forever-somewhere-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/forever_somewhere.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:you@example.com
    disk:
      name: forever-data
      mountPath: /data
      sizeGB: 1
