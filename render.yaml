# Forever Somewhere — Docker deploy (frontend + API, same origin)

services:
  - type: web
    name: forever-somewhere-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/forever_somewhere.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: VAPID_PUBLIC_KEY
        value: ""
      - key: VAPID_PRIVATE_KEY
        value: ""
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:jay@forever-somewhere.local
    disk:
      name: forever-data
      mountPath: /data
      sizeGB: 1
