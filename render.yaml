# Forever Somewhere — single Render service (API + frontend, same origin)

services:
  - type: web
    name: forever-somewhere-api
    runtime: python
    plan: starter
    rootDir: backend
    pythonVersion: "3.12.8"
    buildCommand: >-
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      cd ../frontend &&
      npm install &&
      VITE_API_URL= npm run build &&
      rm -rf ../backend/static &&
      mkdir -p ../backend/static &&
      cp -r dist/* ../backend/static/
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/forever_somewhere.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: VAPID_PUBLIC_KEY
        value: ""
      - key: VAPID_PRIVATE_KEY
        value: ""
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:jay@forever-somewhere.local
    disk:
      name: forever-data
      mountPath: /data
      sizeGB: 1
