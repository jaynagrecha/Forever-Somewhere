# Forever Somewhere — full app on forever-somewhere-web (frontend + API, same origin)

services:
  # Primary app URL — use this on phones
  - type: web
    name: forever-somewhere-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/forever_somewhere.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        value: http://localhost:5173,forever-somewhere-api.onrender.com
      - key: VAPID_PUBLIC_KEY
        value: ""
      - key: VAPID_PRIVATE_KEY
        value: ""
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:jay@forever-somewhere.local
    disk:
      name: forever-data
      mountPath: /data
      sizeGB: 1

  # Old API-only URL → redirect to web
  - type: web
    name: forever-somewhere-api
    runtime: static
    rootDir: redirect-api
    staticPublishPath: .
    routes:
      - type: redirect
        source: /*
        destination: https://forever-somewhere-web.onrender.com/:splat
        status: 301
