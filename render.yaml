# Forever Somewhere
# - forever-somewhere-web  → static frontend (your app URL)
# - forever-somewhere-api  → Docker backend (API + database)

services:
  - type: web
    name: forever-somewhere-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/forever_somewhere.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        value: forever-somewhere-web.onrender.com,http://localhost:5173
      - key: VAPID_PUBLIC_KEY
        value: ""
      - key: VAPID_PRIVATE_KEY
        value: ""
      - key: VAPID_CLAIMS_EMAIL
        value: https://forever-somewhere-web.onrender.com
      - key: RECOVERY_FROM_EMAIL
        sync: false
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
    disk:
      name: forever-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: forever-somewhere-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://forever-somewhere-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
