# Forever Somewhere — full stack on Render (API + static frontend)

services:
  # Backend API
  - type: web
    name: forever-somewhere-api
    runtime: python
    plan: starter
    rootDir: backend
    pythonVersion: "3.12.8"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/forever_somewhere.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        fromService:
          name: forever-somewhere-web
          type: web
          property: host
      - key: VAPID_PUBLIC_KEY
        value: ""
      - key: VAPID_PRIVATE_KEY
        value: ""
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:jay@forever-somewhere.local
    disk:
      name: forever-data
      mountPath: /data
      sizeGB: 1

  # Frontend (static site)
  - type: web
    name: forever-somewhere-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://forever-somewhere-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
